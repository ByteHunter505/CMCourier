# Alfresco Community 23.x — local staging for CMCourier dry-runs.
#
# Usage on Compu B:
#   docker compose -f alfresco-compose.yml up -d
#   # first boot: 3-5 min pulling images + 2-3 min for Alfresco startup
#   docker compose logs -f alfresco | grep "completed"
#
# CMIS endpoint after startup:
#   http://<this-host>:8080/alfresco/api/-default-/public/cmis/versions/1.1/browser
#   admin / admin
#
# Content Model deployment (cmcourier:bacDoc type + properties):
#   1. Drop cmcourier-model.xml into ./alfresco-extension/alfresco/extension/
#   2. docker compose restart alfresco
#
# Tear-down:
#   docker compose -f alfresco-compose.yml down -v
#
# Notes:
# * `-v` on down wipes the alfresco-data volume — drops everything you
#   uploaded. Don't pass it if you want runs to persist.
# * JAVA_OPTS sized for a 6 GB Compu B (leaves ~2 GB headroom). Bump
#   ``-Xmx`` if Compu B is bigger.
# * postgres is the metadata store. Single-volume; not for production.

services:
  alfresco:
    image: alfresco/alfresco-content-repository-community:23.4.0
    container_name: cmcourier-staging-alfresco
    mem_limit: 4500m
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: >-
        -Ddb.driver=org.postgresql.Driver
        -Ddb.username=alfresco
        -Ddb.password=alfresco
        -Ddb.url=jdbc:postgresql://postgres:5432/alfresco
        -Dsolr.host=solr6
        -Dsolr.port=8983
        -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=secret-not-real
        -Dsolr.base.url=/solr
        -Dindex.subsystem.name=solr6
        -Dshare.host=127.0.0.1
        -Dshare.port=8080
        -Dalfresco.host=localhost
        -Dalfresco.port=8080
        -Daos.baseUrlOverwrite=http://localhost:8080/alfresco/aos
        -Dmessaging.broker.url="failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true"
        -Ddeployment.method=DOCKER_COMPOSE
        -Dtransform.service.enabled=true
        -Dtransform.service.url=http://transform-router:8095
        -Dsfs.url=http://shared-file-store:8099/
        -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
        -Xms2g -Xmx4g
    ports:
      - "8080:8080"
    volumes:
      - alfresco-data:/usr/local/tomcat/alf_data
      - ./alfresco-extension:/usr/local/tomcat/shared/classes/alfresco/extension
    depends_on:
      - postgres
      - solr6
      - activemq

  postgres:
    image: postgres:14
    container_name: cmcourier-staging-postgres
    mem_limit: 512m
    environment:
      POSTGRES_PASSWORD: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_DB: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    volumes:
      - postgres-data:/var/lib/postgresql/data

  solr6:
    image: alfresco/alfresco-search-services:2.0.10
    container_name: cmcourier-staging-solr6
    mem_limit: 2g
    environment:
      SOLR_ALFRESCO_HOST: alfresco
      SOLR_ALFRESCO_PORT: 8080
      SOLR_SOLR_HOST: solr6
      SOLR_SOLR_PORT: 8983
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
      ALFRESCO_SECURE_COMMS: secret
      JAVA_TOOL_OPTIONS: >-
        -Dalfresco.secureComms.secret=secret-not-real
    volumes:
      - solr-data:/opt/alfresco-search-services/data

  activemq:
    image: alfresco/alfresco-activemq:5.18-jre17-rockylinux8
    container_name: cmcourier-staging-activemq
    mem_limit: 1g

volumes:
  alfresco-data:
  postgres-data:
  solr-data:
